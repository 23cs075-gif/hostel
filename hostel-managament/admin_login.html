<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/report.css">
</head>
<body>
    <div class="container fade-in">
        <h2><i class="fas fa-user-shield icon"></i> Admin Login</h2>
        <p class="subtitle">Enter credentials to access admin activities</p>

        <form id="adminLoginForm" class="login-form">
            <input type="text" id="adminUsername" name="adminUsername" placeholder="Username" required>
            <input type="password" id="adminPassword" name="adminPassword" placeholder="Password" required>
            <button type="submit" class="btn secondary-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>

        <a href="index.html" class="btn back-btn"><i class="fas fa-home"></i> Back to Home</a>
    </div>
    <script src="js/script.js"></script>
</body>
</html>

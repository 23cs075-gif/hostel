<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<!-- Font Awesome: For Icons in buttons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root {
    --text-light: #F8F8F8; 
    --content-box-bg: rgba(18, 18, 18, 0.8); 
    --btn-primary: #F9A825; 
    --btn-secondary: #D48C1C; 
    --text-dark-btn: #121212; 
    --input-border: #505050; 
    --table-header-bg: #3A3A3A;
    --table-row-hover: #454545;
    --status-available: #66BB6A; 
    --status-full: #EF5350; 
    --status-empty: #42A5F5; 
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    color: var(--text-light);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    width: 100vw;
    margin: 0;
    overflow-y: auto;
    background: #090909;
}

/* Background */
.main-content-area {
    background-image: url('b.jpg'); 
    background-size: cover;
    background-position: center;
    filter: brightness(1.2);
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px 0;
}

/* Container */
.container {
    background-color: var(--content-box-bg);
    padding: 24px;
    border-radius: 20px;
    max-width: 960px;
    width: calc(100% - 24px);
    min-height: auto;
    text-align: center;
    backdrop-filter: blur(10px);
    overflow: visible;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
}

h2 {
    font-size: 1.6rem;
    font-weight: 900;
    margin-bottom: 15px;
}

h3 {
    margin: 10px 0 8px;
    color: var(--btn-primary);
    font-size: 1rem;
    text-align: left;
}

/* Table wrapper */
.table-wrapper {
    overflow-x: auto;
    margin-bottom: 10px;
    border-radius: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    background-color: #242424;
}

table thead tr {
    background-color: var(--table-header-bg);
    color: var(--btn-primary);
}

table th, table td {
    padding: 8px;
    text-align: center;
}

table th {
    font-weight: 700;
    text-transform: uppercase;
}

table tbody tr {
    border-bottom: 1px solid var(--input-border);
    transition: background-color 0.3s ease;
}

table tbody tr:hover {
    background-color: var(--table-row-hover);
}

.status-available { color: var(--status-available); font-weight: 700; }
.status-full { color: var(--status-full); font-weight: 700; }
.status-empty { color: var(--status-empty); font-weight: 700; }

/* Buttons - match Add Room styles */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 25px;
    font-size: 0.95rem;
    font-weight: 700;
    text-decoration: none;
    border: none;
    border-radius: 6px;
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    white-space: nowrap;
}

.secondary-btn { background: var(--btn-secondary); color: var(--text-dark-btn); }
.secondary-btn:hover { background-color: var(--btn-primary); }
.back-btn { background: #444444; color: var(--text-light); }
.back-btn:hover { background-color: #555555; }

.admin-links {
    display: flex;
    flex-wrap: wrap; 
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid var(--input-border);
}

/* Responsive */
@media (max-width: 768px) {
    .main-content-area {
        padding: 20px 0 30px;
    }

    .container {
        padding: 20px 18px;
        width: 100%;
        max-width: 100%;
        border-radius: 18px;
    }

    h2 { font-size: 1.5rem; }
    h3 { font-size: 1rem; margin-top: 22px; }

    .table-wrapper {
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.18);
    }

    table {
        display: block;
        width: 100%;
    }

    table, thead, tbody, th, td, tr { display: block; }
    thead tr { position: absolute; top: -9999px; left: -9999px; }

    tr {
        border: none;
        margin-bottom: 16px;
        padding: 16px 14px;
        border-radius: 18px;
        background-color: rgba(255, 255, 255, 0.04);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    td {
        border: none;
        position: relative;
        padding-left: 46%;
        text-align: left;
        margin: 0 0 12px;
        background: transparent;
        font-size: 0.95rem;
    }

    td:before {
        content: attr(data-label);
        position: absolute;
        top: 16px;
        left: 14px;
        width: 40%;
        font-weight: 700;
        color: var(--btn-primary);
    }

    td:last-child { margin-bottom: 0; }

    .btn { width: 100%; margin-bottom: 10px; }
    .admin-links { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>
<div class="main-content-area">
    <div class="container">
        <h2>Admin Report Dashboard</h2>

        <h3>📌 Students and their Rooms</h3>
        <div class="table-wrapper">
            <table id="studentReport">
                <thead>
                    <tr><th>Name</th><th>Roll No</th><th>Course</th><th>Room</th></tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>

        <h3>📌 Students without Allocation</h3>
        <div class="table-wrapper">
            <table id="unallocatedReport">
                <thead>
                    <tr><th>Name</th><th>Roll No</th><th>Course</th></tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>

        <h3>📌 Room Status</h3>
        <div class="table-wrapper">
            <table id="roomReport">
                <thead>
                    <tr><th>Room Number</th><th>Capacity</th><th>Occupied</th><th>Status</th></tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>

        <div class="admin-links">
            <a href="Admin_main.html" class="btn secondary-btn"><i class="fas fa-chevron-left"></i> Previous Page</a>
            <a href="index.html" class="btn back-btn"><i class="fas fa-home"></i> Back to Home</a>
        </div>
    </div>
</div>
<script src="js/report.js"></script>
</body>
</html>

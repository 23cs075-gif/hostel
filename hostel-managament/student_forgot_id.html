<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Student ID</title>
    <link rel="stylesheet" href="css/stud.css">
</head>
<body class="student-page">
    <div class="main-content-area">
        <div class="container fade-in">
            <h2>Forgot Student ID?</h2>
            <p>Enter your registered email and we will send your Student ID to that address.</p>

            <input type="email" id="forgotEmailInput" placeholder="Registered Email" required>
            <button id="sendIdBtn" class="btn primary-btn">Send ID</button>

            <p id="forgotStatus"></p>

            <div class="admin-links">
                <a href="student_view_allocation.html" class="btn secondary-btn">Back to View Allocation</a>
                <a href="index.html" class="btn back-btn">Home</a>
            </div>
        </div>
    </div>

    <script src="js/forgot_id.js"></script>
</body>
</html>
